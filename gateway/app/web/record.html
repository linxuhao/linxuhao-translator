<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>多语记录</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: 100dvh; background-color: #ffffff; color: #1d1d1f; overflow: hidden; 
        }
        
        .header { 
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: env(safe-area-inset-top, 20px) 20px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 1000; border-bottom: 1px solid #e5e5ea; gap: 12px;
        }
        
        .header-title-wrapper { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: 0.2s; margin-left: -8px; flex: 1; min-width: 0; }
        .header-title-wrapper:active { background: #f2f2f7; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .edit-icon { font-size: 14px; opacity: 0.5; flex-shrink: 0; }

        .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        
        .action-btn {
            padding: 6px 12px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600;
            cursor: pointer; outline: none; transition: 0.2s; white-space: nowrap;
        }
        .action-btn:active { transform: scale(0.95); opacity: 0.8; }
        .new-btn { background: #e8f5e9; color: #34c759; }
        .files-btn { background: #f2f2f7; color: #007aff; }
        .lang-select {
            padding: 6px 10px; border-radius: 8px; border: 1px solid #e5e5ea;
            font-size: 13px; font-weight: 600; background: white; color: #1d1d1f;
            cursor: pointer; outline: none; transition: 0.2s; max-width: 100px;
        }
        .lang-select:active { transform: scale(0.95); }

        .transcript-container { 
            width: 100%; max-width: 800px; height: 100dvh;
            padding: calc(env(safe-area-inset-top, 20px) + 95px) 20px 160px; 
            overflow-y: auto; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 24px;
        }
        
        .record-block {
            display: flex; flex-direction: column; gap: 4px; padding-bottom: 16px; 
            border-bottom: 1px dashed #f0f0f0; transition: opacity 0.3s;
        }
        .time-badge { font-size: 11px; color: #c7c7cc; font-family: monospace; }
        .original-text { font-size: 14px; color: #86868b; line-height: 1.5; font-weight: 400; }
        .translated-text { font-size: 18px; color: #1d1d1f; line-height: 1.5; font-weight: 500; }

        .control-dock {
            position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px); left: 50%; transform: translateX(-50%);
            background: #1d1d1f; border-radius: 40px; padding: 8px 24px;
            display: flex; align-items: center; gap: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 50;
        }
        .record-btn {
            width: 48px; height: 48px; border-radius: 50%; background: #ff3b30; border: 3px solid #1d1d1f;
            box-shadow: 0 0 0 2px #ff3b30; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .record-btn.active { background: #1d1d1f; border-radius: 12px; transform: scale(0.8); }
        .status-text { color: white; font-size: 14px; font-weight: 500; width: 80px; text-align: center; white-space: nowrap;}
        
        .vad-indicator { width: 8px; height: 8px; border-radius: 50%; background: #34c759; opacity: 0.3; transition: 0.1s; flex-shrink: 0;}
        .vad-indicator.active { opacity: 1; box-shadow: 0 0 8px #34c759; }
        
        .thinking-pulse { animation: pulse 1.5s infinite; font-style: italic; color: #a1a1a6; font-size: 14px; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            background: #fff; width: 90%; max-width: 450px; border-radius: 20px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 80vh; display: flex; flex-direction: column;
            transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .modal-header h2 { margin: 0; font-size: 18px; }
        .close-modal-btn { background: none; border: none; font-size: 20px; color: #86868b; cursor: pointer; padding: 4px; }
        .file-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .file-item {
            background: #f9f9f9; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px;
            border: 2px solid transparent; transition: 0.2s;
        }
        .file-item.active-session { border-color: #007aff; background: #f0f8ff; }
        .file-info { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .file-title-area { display: flex; align-items: center; gap: 6px; flex: 1; cursor: pointer; min-width: 0; }
        .file-title-area:active { opacity: 0.6; }
        .file-title { font-weight: 600; font-size: 14px; color: #1d1d1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .file-count { font-size: 12px; color: #86868b; background: #e5e5ea; padding: 2px 6px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .file-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .f-btn { padding: 4px 10px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
        .f-btn-load { background: #007aff; color: white; }
        .f-btn-load:disabled { background: #ccc; cursor: not-allowed; }
        .f-btn-export { background: #e8f5e9; color: #34c759; }
        .f-btn-delete { background: #ffebee; color: #ff3b30; }
        .empty-files { text-align: center; color: #86868b; font-size: 14px; padding: 20px; }

        .bottom-tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: calc(60px + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; text-decoration: none; color: #86868b; flex: 1; height: 100%; transition: color 0.2s; }
        .tab-item.active { color: #007aff; }
        .tab-icon { font-size: 22px; }
        .tab-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title-wrapper" id="headerTitleWrapper" onclick="renameCurrentSession()">
            <h1 id="headerTitleText" data-i18n="title_record">📝 会议记录</h1>
            <span class="edit-icon">✏️</span>
        </div>
        <div class="header-actions">
            <select id="targetLangSelect" class="lang-select" onchange="onTargetLangChange()"></select>
            <button id="newSessionBtn" class="action-btn new-btn" data-i18n="btn_new">➕ New</button>
            <button id="openFilesBtn" class="action-btn files-btn" data-i18n="btn_files">📂 Files</button>
        </div>
    </div>

    <div class="transcript-container" id="transcriptBox">
        <div id="initHint" style="text-align: center; color: #a1a1a6; font-size: 13px; margin-top: 20px;" data-i18n="hint_record">点击下方按钮开始持续监听</div>
    </div>

    <div class="control-dock">
        <div class="vad-indicator" id="vadDot"></div>
        <div class="record-btn" id="recordToggle"></div>
        <div class="status-text" id="statusLabel" data-i18n="status_sleep">就绪</div>
    </div>

    <div class="modal-overlay" id="filesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="modal_files_title">本地会议记录</h2>
                <button class="close-modal-btn" id="closeFilesBtn">✖</button>
            </div>
            <div class="file-list" id="fileListContainer"></div>
        </div>
    </div>

    <div class="bottom-tab-bar">
        <a href="/" class="tab-item">
            <span class="tab-icon">🌐</span>
            <span class="tab-label" data-i18n="tab_trans">同传</span>
        </a>
        <a href="/tutor" class="tab-item">
            <span class="tab-icon">👨‍🏫</span>
            <span class="tab-label" data-i18n="tab_tutor">外教</span>
        </a>
        <a href="/record" class="tab-item active">
            <span class="tab-icon">📝</span>
            <span class="tab-label" data-i18n="tab_record">记录</span>
        </a>
        <a href="https://github.com/linxuhao/linxuhao-translator" target="_blank" class="tab-item">
            <span class="tab-icon">
                <svg viewBox="0 0 16 16" aria-hidden="true" style="width: 22px; height: 22px; fill: currentColor;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </span>
            <span class="tab-label">GitHub</span>
        </a>
        <a href="/admin" class="tab-item" id="adminTab" style="display: none;">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_admin">设置</span>
        </a>
    </div>

<script src="/resources/i18n.js?v=1.8"></script>
<script>
    let debug = false;
    let nativeLangCode = 'zh';
    let recordTargetLangCode = 'zh';
    const transcriptBox = document.getElementById('transcriptBox');
    
    let meetingSessions = [];
    let currentSessionId = null;
    let fullTranscript = []; 

    function getDict() { return typeof I18N_DICT !== 'undefined' ? (I18N_DICT[nativeLangCode] || I18N_DICT["en"]) : {}; }

    function loadAllSessionsFromStorage() {
        try {
            const saved = localStorage.getItem('meeting_sessions_v2');
            if (saved) meetingSessions = JSON.parse(saved);
        } catch(e) { meetingSessions = []; }
    }

    function saveAllSessionsToStorage() {
        try {
            localStorage.setItem('meeting_sessions_v2', JSON.stringify(meetingSessions));
        } catch(e) {
            alert(getDict().msg_storage_full || "Local storage full. Please export and delete old records.");
        }
    }

    function cleanEmptySessions() {
        // 清理空会话，但在 UI 端保持 pending 状态的数据不被误判为空
        meetingSessions = meetingSessions.filter(s => (s.data && s.data.length > 0) || s.id === currentSessionId);
        saveAllSessionsToStorage();
    }

    function syncCurrentSession() {
        if (!currentSessionId) return;
        const session = meetingSessions.find(s => s.id === currentSessionId);
        if (session) {
            // 🎯 核心变更：只保存已经完成 (非 pending) 的记录到 localStorage
            session.data = fullTranscript.filter(t => !t.pending).map(c => ({
                original: c.original,
                translated: c.translated,
                timestamp: c.timestamp,
                detected_langs: c.detected_langs
            }));
            saveAllSessionsToStorage();
        }
    }

    function syncHeaderTitle() {
        const session = meetingSessions.find(s => s.id === currentSessionId);
        if (session) {
            document.getElementById('headerTitleText').innerText = session.title;
        }
    }

    function renameSession(id) {
        const session = meetingSessions.find(s => s.id === id);
        if (!session) return;
        const dict = getDict();
        const newName = prompt(dict.prompt_rename || "Enter new meeting name:", session.title);
        if (newName && newName.trim() !== "") {
            session.title = newName.trim();
            saveAllSessionsToStorage();
            if (id === currentSessionId) syncHeaderTitle();
            renderFileListModal(); 
        }
    }

    function renameCurrentSession() {
        if (currentSessionId) renameSession(currentSessionId);
    }

    function createNewSession(switchImmediately = true) {
        cleanEmptySessions(); 
        const id = Date.now().toString();
        const dateStr = new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        const dict = getDict();
        const defaultName = dict.default_meeting_name || "Meeting";
        
        const newSession = {
            id: id,
            title: `${defaultName} ${dateStr}`,
            data: []
        };
        
        meetingSessions.unshift(newSession); 
        saveAllSessionsToStorage();
        
        if (switchImmediately) {
            switchSession(id);
        }
    }

    function switchSession(id) {
        currentSessionId = id;
        localStorage.setItem('current_session_id', id);
        
        const session = meetingSessions.find(s => s.id === id);
        if (!session) return;
        
        syncHeaderTitle();
        fullTranscript = session.data || [];
        
        transcriptBox.innerHTML = '';
        const dict = getDict();
        
        if (fullTranscript.length === 0) {
            transcriptBox.innerHTML = `<div id="initHint" style="text-align: center; color: #a1a1a6; font-size: 13px; margin-top: 20px;" data-i18n="hint_record">${dict.hint_record || 'Ready'}</div>`;
        } else {
            fullTranscript.forEach(turn => {
                const domBlock = document.createElement('div');
                domBlock.className = 'record-block';
                domBlock.innerHTML = `
                    <div class="time-badge">${turn.timestamp}</div>
                    <div class="original-text">${turn.original}</div>
                    <div class="translated-text">${turn.translated}</div>
                `;
                transcriptBox.appendChild(domBlock);
            });
            setTimeout(() => transcriptBox.scrollTo({ top: transcriptBox.scrollHeight, behavior: 'auto' }), 50);
        }
        renderFileListModal(); 
    }

    function deleteSession(id) {
        const dict = getDict();
        if (!confirm(dict.prompt_delete || "Delete this record?")) return;
        
        meetingSessions = meetingSessions.filter(s => s.id !== id);
        saveAllSessionsToStorage();
        
        if (currentSessionId === id) {
            if (meetingSessions.length > 0) switchSession(meetingSessions[0].id);
            else createNewSession(true);
        } else {
            renderFileListModal(); 
        }
    }

    function exportSession(id) {
        const session = meetingSessions.find(s => s.id === id);
        const dict = getDict();
        if (!session || !session.data || session.data.length === 0) {
            alert(dict.msg_empty_export || "File is empty");
            return;
        }
        
        let txtContent = "=================================\n";
        txtContent += `Title: ${session.title}\n`;
        txtContent += `Exported: ${new Date().toLocaleString()}\n`;
        txtContent += "=================================\n\n";
        
        session.data.forEach(turn => {
            txtContent += `[${turn.timestamp}]\n`;
            txtContent += `Original: ${turn.original}\n`;
            txtContent += `Translation: ${turn.translated}\n\n`;
        });
        
        const blob = new Blob([txtContent], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Transcript_${session.title.replace(/\s+/g, '_')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function initLangSelector() {
        const select = document.getElementById('targetLangSelect');
        recordTargetLangCode = localStorage.getItem('recordTargetLangPref') || nativeLangCode;
        
        if (typeof SUPPORTED_LANGS !== 'undefined') {
            select.innerHTML = SUPPORTED_LANGS.map(lang =>
                `<option value="${lang.v}" ${lang.v === recordTargetLangCode ? 'selected' : ''}>${lang.n}</option>`
            ).join('');
        } else {
            const commonLangs = [
                {v: "zh", n: "中文"}, {v: "en", n: "English"}, {v: "fr", n: "Français"},
                {v: "es", n: "Español"}, {v: "de", n: "Deutsch"}, {v: "ja", n: "日本語"}
            ];
            select.innerHTML = commonLangs.map(lang =>
                `<option value="${lang.v}" ${lang.v === recordTargetLangCode ? 'selected' : ''}>${lang.n}</option>`
            ).join('');
        }
    }
    
    function onTargetLangChange() {
        const select = document.getElementById('targetLangSelect');
        recordTargetLangCode = select.value;
        localStorage.setItem('recordTargetLangPref', recordTargetLangCode);
    }

    function initUI() {
        nativeLangCode = localStorage.getItem('nativeLangPref') || 'zh';
        
        initLangSelector();

        if (window.applyUILanguage) window.applyUILanguage(nativeLangCode);
        updateDynamicStatusUI('status_sleep');

        loadAllSessionsFromStorage();
        cleanEmptySessions(); 
        
        if (meetingSessions.length === 0) {
            createNewSession(true);
        } else {
            const savedCurrentId = localStorage.getItem('current_session_id');
            const targetId = meetingSessions.find(s => s.id === savedCurrentId) ? savedCurrentId : meetingSessions[0].id;
            switchSession(targetId);
        }
        fetch('/api/me').then(res => res.json()).then(data => {
            if(data.role === 'admin') {
                debug = true;
                document.getElementById('adminTab').style.display = 'flex';
            }
        }).catch(()=>{});
    }

    function updateDynamicStatusUI(i18nKey) {
        const dict = getDict();
        if (dict[i18nKey]) {
            document.getElementById('statusLabel').innerText = dict[i18nKey];
        }
    }

    const filesModal = document.getElementById('filesModal');
    document.getElementById('openFilesBtn').addEventListener('click', () => {
        cleanEmptySessions(); 
        renderFileListModal();
        filesModal.classList.add('active');
    });
    document.getElementById('closeFilesBtn').addEventListener('click', () => filesModal.classList.remove('active'));
    document.getElementById('newSessionBtn').addEventListener('click', () => {
        if (fullTranscript.length === 0) return; 
        createNewSession(true);
    });

    function renderFileListModal() {
        const container = document.getElementById('fileListContainer');
        const dict = getDict();
        
        if (meetingSessions.length === 0) {
            container.innerHTML = `<div class="empty-files">${dict.msg_empty_files || 'No saved records'}</div>`;
            return;
        }

        container.innerHTML = meetingSessions.map(session => {
            const isActive = session.id === currentSessionId;
            const dataCount = session.data ? session.data.length : 0;
            const itemsWord = dict.word_items || "items";
            const renameTitle = dict.title_rename || "Rename";

            return `
                <div class="file-item ${isActive ? 'active-session' : ''}">
                    <div class="file-info">
                        <div class="file-title-area" onclick="renameSession('${session.id}')" title="${renameTitle}">
                            <span class="file-title">${session.title}</span>
                            <span class="edit-icon">✏️</span>
                        </div>
                        <span class="file-count">${dataCount} ${itemsWord}</span>
                    </div>
                    <div class="file-actions">
                        <button class="f-btn f-btn-load" onclick="switchSession('${session.id}')" ${isActive ? 'disabled' : ''}>
                            ${isActive ? (dict.btn_active || 'Active') : (dict.btn_load || 'Load')}
                        </button>
                        <button class="f-btn f-btn-export" onclick="exportSession('${session.id}')">${dict.btn_export || 'Export'}</button>
                        <button class="f-btn f-btn-delete" onclick="deleteSession('${session.id}')" title="Delete">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    let isRecording = false;
    let audioContext, analyser, microphone, mediaRecorder, currentStream = null;
    let isRecordingChunk = false;
    let audioChunks = [], silenceStartTime = 0, recordStartTime = 0, animationFrameId;

    const VAD_THRESHOLD = 0.04;  
    const SILENCE_LIMIT = 800;  
    const MAX_RECORD_LIMIT = 20000; 

    const recordToggle = document.getElementById('recordToggle');
    const statusLabel = document.getElementById('statusLabel');
    const vadDot = document.getElementById('vadDot');

    async function toggleRecording() {
        if (isRecording) {
            stopRecordingSession();
            return;
        }
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            analyser = audioContext.createAnalyser(); analyser.fftSize = 512;
            microphone = audioContext.createMediaStreamSource(currentStream); microphone.connect(analyser);

            let options = { mimeType: 'audio/webm' }; 
            if (!MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/mp4' }; 
            
            mediaRecorder = new MediaRecorder(currentStream, options);
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => { 
                const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType }); 
                audioChunks = []; 
                if(blob.size > 1000) sendAudioChunk(blob);
            };

            isRecording = true;
            recordToggle.classList.add('active');
            updateDynamicStatusUI('status_listen');
            statusLabel.style.color = "white";
            detectAudioLoop();
            
            if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
        } catch (err) { alert("麦克风权限被拒或设备异常"); }
    }

    function stopRecordingSession() {
        isRecording = false;
        recordToggle.classList.remove('active');
        updateDynamicStatusUI('status_sleep');
        statusLabel.style.color = "white";
        vadDot.classList.remove('active');
        cancelAnimationFrame(animationFrameId);
        if (isRecordingChunk) { mediaRecorder.stop(); isRecordingChunk = false; }
        if (audioContext) audioContext.suspend();
        if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
    }

    recordToggle.addEventListener('click', toggleRecording);

    function detectAudioLoop() {
        if (!isRecording) return;
        const pcmData = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(pcmData);
        let sumSquares = 0.0; for (const amp of pcmData) sumSquares += amp * amp;
        const rms = Math.sqrt(sumSquares / pcmData.length);
        const now = Date.now();

        if (rms > VAD_THRESHOLD) {
            vadDot.classList.add('active');
            silenceStartTime = 0; 
            if (!isRecordingChunk) { 
                isRecordingChunk = true; 
                recordStartTime = now; 
                mediaRecorder.start(); 
                updateDynamicStatusUI('status_capture');
                statusLabel.style.color = "#34c759";
            }
        } else {
            vadDot.classList.remove('active');
            if (isRecordingChunk) {
                if (silenceStartTime === 0) silenceStartTime = now;
                if (now - silenceStartTime > SILENCE_LIMIT) { 
                    isRecordingChunk = false; 
                    mediaRecorder.stop(); 
                    updateDynamicStatusUI('status_listen');
                    statusLabel.style.color = "white";
                }
            }
        }
        
        if (isRecordingChunk && (now - recordStartTime > MAX_RECORD_LIMIT)) { 
            isRecordingChunk = false; 
            mediaRecorder.stop(); 
            silenceStartTime = 0; 
        }
        animationFrameId = requestAnimationFrame(detectAudioLoop);
    }

    async function sendAudioChunk(audioBlob) {
        // 🎯 核心修复：为每个块生成全局唯一的 ID
        const chunkId = 'chunk_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const dict = getDict();
        const thinkingText = nativeLangCode.startsWith('zh') ? "🧠 AI 正在融合与提炼..." : "🧠 AI is merging & refining...";

        const hint = document.getElementById('initHint');
        if (hint) hint.style.display = 'none';

        // 🎯 核心修复1：在请求发出前，立刻在 DOM 中占位，绝对锁定视觉上的时序
        let chunkBlock = document.createElement('div');
        chunkBlock.className = 'record-block';
        chunkBlock.id = chunkId;
        chunkBlock.innerHTML = `<div class="thinking-pulse">${thinkingText}</div>`;
        transcriptBox.appendChild(chunkBlock);
        transcriptBox.scrollTo({ top: transcriptBox.scrollHeight, behavior: 'smooth' });

        // 🎯 核心修复2：在全量数据集中也插入一个带 pending 标记的占位对象
        let currentTurn = { _id: chunkId, pending: true };
        fullTranscript.push(currentTurn);

        const formData = new FormData();
        formData.append("audio_file", audioBlob, "chunk.webm");
        formData.append("target_lang", recordTargetLangCode);
        formData.append("debug", debug ? "true" : "false");
        
        // 提取上下文明文，过滤掉仍在思考中的数据
        const apiHistory = fullTranscript.filter(t => !t.pending).slice(-5);
        formData.append("chat_history", JSON.stringify(apiHistory));

        try {
            const response = await fetch("/api/record", { method: "POST", body: formData });
            
            if (!response.ok) {
                // 如果失败了，撤销该占位符
                chunkBlock.remove();
                fullTranscript = fullTranscript.filter(t => t._id !== chunkId);
                const errData = await response.json();
                console.error("API Error:", errData.error);
                return;
            }

            const payload = await response.json();
            
            if (payload.original && payload.original.length > 0) {
                const timeStr = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                // 🎯 核心修复3：直接锁定属于自己的坑位原位渲染文本，无视谁先返回
                chunkBlock.innerHTML = `
                    <div class="time-badge">${timeStr}</div>
                    <div class="original-text">${payload.original}</div>
                    <div class="translated-text">${payload.translation}</div>
                `;
                
                // 原位解除数据数组的 pending 锁定并填充数据
                currentTurn.pending = false;
                currentTurn.original = payload.original;
                currentTurn.translated = payload.translation;
                currentTurn.timestamp = timeStr;
                currentTurn.detected_langs = payload.detected_langs;

                syncCurrentSession();
                transcriptBox.scrollTo({ top: transcriptBox.scrollHeight, behavior: 'smooth' });
            } else {
                chunkBlock.remove();
                fullTranscript = fullTranscript.filter(t => t._id !== chunkId);
            }

        } catch (error) { 
            console.error("Fetch Error:", error);
            chunkBlock.remove();
            fullTranscript = fullTranscript.filter(t => t._id !== chunkId);
        }
    }

    window.onload = initUI;
</script>
