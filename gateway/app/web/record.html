<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>多语记录</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: 100dvh; background-color: #ffffff; color: #1d1d1f; overflow: hidden; 
        }
        
        /* 顶部控制栏 */
        .header { 
            width: 100%; padding: env(safe-area-inset-top, 20px) 20px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; border-bottom: 1px solid #e5e5ea; flex-shrink: 0;
        }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; }
        .lang-group { display: flex; gap: 8px; align-items: center; }
        .lang-select { 
            padding: 6px 10px; border-radius: 8px; border: 1px solid #d2d2d7; 
            font-size: 13px; background: #f5f5f7; outline: none; max-width: 100px;
        }

        /* 沉浸式记录流 */
        .transcript-container { 
            width: 100%; max-width: 800px; flex: 1; 
            /* 预留出控制台(80px)和TabBar(60px)的高度，防止最底部的字被遮挡 */
            padding: 20px 20px 160px; 
            overflow-y: auto; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 24px;
        }
        
        .record-block {
            display: flex; flex-direction: column; gap: 6px; padding-bottom: 16px; 
            border-bottom: 1px dashed #f0f0f0; transition: opacity 0.3s;
        }
        .original-text { font-size: 14px; color: #86868b; line-height: 1.5; font-weight: 400; }
        .translated-text { font-size: 18px; color: #1d1d1f; line-height: 1.5; font-weight: 500; }
        .streaming-cursor { 
            display: inline-block; width: 4px; height: 18px; background-color: #007aff; 
            animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* 悬浮录音控制台 (布局修复) */
        .control-dock {
            /* 🎯 核心修复：使用 bottom 和 calc() 将其推高到 TabBar 之上，避免暴力的 padding */
            position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px); left: 50%; transform: translateX(-50%);
            background: #1d1d1f; border-radius: 40px; padding: 8px 24px;
            display: flex; align-items: center; gap: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 50;
        }
        .record-btn {
            width: 48px; height: 48px; border-radius: 50%; background: #ff3b30; border: 3px solid #1d1d1f;
            box-shadow: 0 0 0 2px #ff3b30; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .record-btn.active { background: #1d1d1f; border-radius: 12px; transform: scale(0.8); }
        .status-text { color: white; font-size: 14px; font-weight: 500; width: 80px; text-align: center; white-space: nowrap;}
        
        .vad-indicator { width: 8px; height: 8px; border-radius: 50%; background: #34c759; opacity: 0.3; transition: 0.1s; flex-shrink: 0;}
        .vad-indicator.active { opacity: 1; box-shadow: 0 0 8px #34c759; }

        /* 🎯 底部原生导航栏 (Bottom Tab Bar) */
        .bottom-tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: calc(60px + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; text-decoration: none; color: #86868b; flex: 1; height: 100%; transition: color 0.2s; }
        .tab-item.active { color: #007aff; }
        .tab-icon { font-size: 22px; }
        .tab-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1 data-i18n="title_record">📝 会议记录</h1>
        <div class="lang-group">
            <select class="lang-select" id="langNative"></select>
            <span style="color:#86868b; font-size: 12px;">⇌</span>
            <select class="lang-select" id="langForeign"></select>
        </div>
    </div>

    <div class="transcript-container" id="transcriptBox">
        <div id="initHint" style="text-align: center; color: #a1a1a6; font-size: 13px; margin-top: 20px;" data-i18n="hint_record">点击下方按钮开始持续监听</div>
    </div>

    <div class="control-dock">
        <div class="vad-indicator" id="vadDot"></div>
        <div class="record-btn" id="recordToggle"></div>
        <div class="status-text" id="statusLabel" data-i18n="status_sleep">就绪</div>
    </div>

    <div class="bottom-tab-bar">
        <a href="/" class="tab-item">
            <span class="tab-icon">🌐</span>
            <span class="tab-label" data-i18n="tab_trans">同传</span>
        </a>
        <a href="/tutor" class="tab-item">
            <span class="tab-icon">👨‍🏫</span>
            <span class="tab-label" data-i18n="tab_tutor">外教</span>
        </a>
        <a href="/record" class="tab-item active">
            <span class="tab-icon">📝</span>
            <span class="tab-label" data-i18n="tab_record">记录</span>
        </a>
        <a href="https://github.com/linxuhao/linxuhao-translator" target="_blank" class="tab-item">
            <span class="tab-icon">
                <svg viewBox="0 0 16 16" aria-hidden="true" style="width: 22px; height: 22px; fill: currentColor;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </span>
            <span class="tab-label">GitHub</span>
        </a>
        <a href="/admin" class="tab-item" id="adminTab" style="display: none;">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_admin">设置</span>
        </a>
    </div>

<script src="/resources/i18n.js?v=1.4"></script>
<script>
    // ==========================================
    // 基础设置与 i18n 注入
    // ==========================================
    let nativeLangCode = 'zh';

    function initUI() {
        const langNativeSelect = document.getElementById('langNative');
        const langForeignSelect = document.getElementById('langForeign');

        // 动态渲染字典中的语种列表
        if (typeof SUPPORTED_LANGS !== 'undefined') {
            const optionsHtml = SUPPORTED_LANGS.map(l => `<option value="${l.v}">${l.n}</option>`).join('');
            langNativeSelect.innerHTML = optionsHtml;
            langForeignSelect.innerHTML = optionsHtml;
        }

        // 读取本地缓存偏好
        const savedNative = localStorage.getItem('nativeLangPref') || 'zh';
        const savedForeign = localStorage.getItem('targetLangPref') || 'fr';
        
        langNativeSelect.value = savedNative;
        langForeignSelect.value = savedForeign;
        nativeLangCode = savedNative;

        // 执行初始化的多语言渲染
        if (window.applyUILanguage) window.applyUILanguage(nativeLangCode);
        updateDynamicStatusUI('status_sleep');

        // 监听系统级配置修改
        langNativeSelect.addEventListener('change', (e) => {
            nativeLangCode = e.target.value;
            localStorage.setItem('nativeLangPref', nativeLangCode);
            if (window.applyUILanguage) window.applyUILanguage(nativeLangCode);
            if (!isRecording) updateDynamicStatusUI('status_sleep');
        });
        
        langForeignSelect.addEventListener('change', (e) => {
            localStorage.setItem('targetLangPref', e.target.value);
        });
    }

    // 动态状态文本更新器
    function updateDynamicStatusUI(i18nKey) {
        if (typeof I18N_DICT === 'undefined') return;
        const dict = I18N_DICT[nativeLangCode] || I18N_DICT["zh"];
        if (dict[i18nKey]) {
            document.getElementById('statusLabel').innerText = dict[i18nKey];
        }
    }

    // ==========================================
    // 核心状态与 VAD 配置 (针对会议加长截断延迟)
    // ==========================================
    let isRecording = false;
    let audioContext, analyser, microphone, mediaRecorder, currentStream = null;
    let isRecordingChunk = false;
    let audioChunks = [], silenceStartTime = 0, recordStartTime = 0, animationFrameId;

    const VAD_THRESHOLD = 0.02;  
    const SILENCE_LIMIT = 1800;  
    const MAX_RECORD_LIMIT = 15000; 

    const transcriptBox = document.getElementById('transcriptBox');
    const recordToggle = document.getElementById('recordToggle');
    const statusLabel = document.getElementById('statusLabel');
    const vadDot = document.getElementById('vadDot');
    const chatHistory = []; 

    // ==========================================
    // 录音与静音检测逻辑
    // ==========================================
    async function toggleRecording() {
        if (isRecording) {
            stopRecordingSession();
            return;
        }
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            analyser = audioContext.createAnalyser(); analyser.fftSize = 512;
            microphone = audioContext.createMediaStreamSource(currentStream); microphone.connect(analyser);

            let options = { mimeType: 'audio/webm' }; 
            if (!MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/mp4' }; 
            
            mediaRecorder = new MediaRecorder(currentStream, options);
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => { 
                const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType }); 
                audioChunks = []; 
                if(blob.size > 1000) sendAudioChunk(blob);
            };

            isRecording = true;
            recordToggle.classList.add('active');
            updateDynamicStatusUI('status_listen');
            statusLabel.style.color = "white";
            detectAudioLoop();
            
            if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
        } catch (err) { alert("麦克风权限被拒或设备异常"); }
    }

    function stopRecordingSession() {
        isRecording = false;
        recordToggle.classList.remove('active');
        updateDynamicStatusUI('status_sleep');
        statusLabel.style.color = "white";
        vadDot.classList.remove('active');
        cancelAnimationFrame(animationFrameId);
        if (isRecordingChunk) { mediaRecorder.stop(); isRecordingChunk = false; }
        if (audioContext) audioContext.suspend();
        if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
    }

    recordToggle.addEventListener('click', toggleRecording);

    function detectAudioLoop() {
        if (!isRecording) return;
        const pcmData = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(pcmData);
        let sumSquares = 0.0; for (const amp of pcmData) sumSquares += amp * amp;
        const rms = Math.sqrt(sumSquares / pcmData.length);
        const now = Date.now();

        if (rms > VAD_THRESHOLD) {
            vadDot.classList.add('active');
            silenceStartTime = 0; 
            if (!isRecordingChunk) { 
                isRecordingChunk = true; 
                recordStartTime = now; 
                mediaRecorder.start(); 
                updateDynamicStatusUI('status_capture');
                statusLabel.style.color = "#34c759";
            }
        } else {
            vadDot.classList.remove('active');
            if (isRecordingChunk) {
                if (silenceStartTime === 0) silenceStartTime = now;
                if (now - silenceStartTime > SILENCE_LIMIT) { 
                    isRecordingChunk = false; 
                    mediaRecorder.stop(); 
                    updateDynamicStatusUI('status_listen');
                    statusLabel.style.color = "white";
                }
            }
        }
        
        if (isRecordingChunk && (now - recordStartTime > MAX_RECORD_LIMIT)) { 
            isRecordingChunk = false; 
            mediaRecorder.stop(); 
            silenceStartTime = 0; 
        }
        animationFrameId = requestAnimationFrame(detectAudioLoop);
    }

    // ==========================================
    // SSE 流式接收与 UI 渲染
    // ==========================================
    async function sendAudioChunk(audioBlob) {
        const formData = new FormData();
        formData.append("audio_file", audioBlob, "chunk.webm");
        formData.append("native_lang", document.getElementById('langNative').value); 
        formData.append("last_foreign_lang", document.getElementById('langForeign').value); 
        
        const apiHistory = chatHistory.slice(-1);
        formData.append("chat_history", JSON.stringify(apiHistory));

        try {
            const response = await fetch("/api/stream_voice", { method: "POST", body: formData });
            if (!response.ok) return;

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            
            let domBlock = null;
            let domTranslatedText = null;
            let currentTurn = { original: "", translated: "" };

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                const events = decoder.decode(value, { stream: true }).split("\n\n");
                for (const ev of events) {
                    if (ev.startsWith("data: ")) {
                        try {
                            const payload = JSON.parse(ev.slice(6));
                            
                            if (payload.event === "start") {
                                const hint = document.getElementById('initHint');
                                if(hint) hint.remove();

                                currentTurn.original = payload.original_text;
                                
                                domBlock = document.createElement('div');
                                domBlock.className = 'record-block';
                                domBlock.innerHTML = `
                                    <div class="original-text">${payload.original_text}</div>
                                    <div class="translated-text"><span class="t-content"></span><span class="streaming-cursor"></span></div>
                                `;
                                transcriptBox.appendChild(domBlock);
                                domTranslatedText = domBlock.querySelector('.t-content');
                                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                            } 
                            else if (payload.event === "token" && domTranslatedText) {
                                currentTurn.translated += payload.text;
                                domTranslatedText.innerText = currentTurn.translated;
                                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                            }
                            else if (payload.event === "end") {
                                if (payload.reason === "empty_audio") return; 
                                
                                if (domBlock) {
                                    const cursor = domBlock.querySelector('.streaming-cursor');
                                    if (cursor) cursor.remove();
                                }
                                chatHistory.push(currentTurn);
                                if (chatHistory.length > 5) chatHistory.shift();
                            }
                        } catch (err) {}
                    }
                }
            }
        } catch (error) { console.error("API Error:", error); }
    }

    // 执行初始化
    window.onload = initUI;
</script>
</body>
</html>
