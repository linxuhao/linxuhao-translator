<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f5f5f7">
    <title>随身翻译官</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            
            /* 🎯 核心物理修复：抛弃 -webkit-fill-available，启用现代 dVH */
            height: 100vh; /* 老旧浏览器兜底 */
            height: 100dvh; /* 现代移动端动态视口高度（自动计算地址栏） */
            
            background-color: #f5f5f7; color: #1d1d1f; 
            overflow: hidden; /* 绝对锁死最外层，禁止整个网页的橡皮筋回弹 */
        }
        
        /* 顶部极简 Header */
        .header { 
            width: 100%; padding: env(safe-area-inset-top, 20px) 20px 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(245, 245, 247, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-left { display: flex; flex-direction: column; gap: 4px; }
        h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .lang-indicator { font-size: 12px; color: #86868b; font-weight: 500; }
        .lang-select { 
            padding: 6px 12px; border-radius: 20px; border: none; font-size: 14px; font-weight: 600;
            background: #e8e8ed; color: #1d1d1f; outline: none; appearance: none; text-align: center;
        }

        .history-container { 
            width: 100%; max-width: 600px; 
            flex: 1; /* 在确定的 body 100dvh 下，完美填满剩余可用空间 */
            min-height: 0; /* 🎯 解锁 Flex 滚动轴封印，强制内容超出时触发滚动条 */
            padding: 15px 15px 140px; /* 底部留出 140px 物理空间，确保最后一条消息不被控制岛遮挡 */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* 注入 iOS 丝滑惯性滚动 */
            display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
        }
        .history-item { 
            display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; 
            background: #fff; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            transition: all 0.3s ease; position: relative;
        }
        .history-item::before {
            content: ''; position: absolute; left: 0; top: 15%; height: 70%; width: 4px; 
            background: #007aff; border-radius: 0 4px 4px 0;
        }
        .history-item.played::before { background: #34c759; }
        .history-checkbox { margin-top: 4px; transform: scale(1.3); accent-color: #007aff; flex-shrink: 0; }
        .history-content { flex-grow: 1; font-size: 16px; line-height: 1.5; word-break: break-word; }
        .original-text { color: #86868b; font-size: 13px; margin-bottom: 4px; font-weight: 500; }
        .translated-text { color: #1d1d1f; font-weight: 600; }

        /* 打字机气泡 */
        .streaming-box { background: #fff8e1; display: none; }
        .streaming-box::before { background: #ff9500; }
        .streaming-cursor { display: inline-block; width: 6px; height: 16px; background-color: #ff9500; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px;}
        @keyframes blink { 50% { opacity: 0; } }

        /* 🎯 控制岛 (Action Island) */
        .action-island-wrapper {
            position: fixed; bottom: calc(env(safe-area-inset-bottom, 20px) + 70px); 
            width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 50;
            pointer-events: none; /* 让缝隙可以穿透点击 */
        }
        .action-island {
            display: flex; align-items: center; justify-content: center; gap: 20px; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            pointer-events: auto; border: 1px solid rgba(0,0,0,0.05);
        }
        
        .side-action-btn { 
            width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .btn-clear { background: #ffebee; color: #ff3b30; }
        .btn-clear:active { background: #ffcdd2; }
        .btn-play { background: #e8f5e9; color: #34c759; }
        .btn-play:active { background: #c8e6c9; }

        /* VAD 主按钮 (FAB) */
        .vad-toggle-btn { 
            width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #e5e5ea, #d1d1d6); 
            color: #1d1d1f; font-size: 28px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none;
            display: flex; align-items: center; justify-content: center;
        }
        .vad-toggle-btn.active { 
            background: linear-gradient(135deg, #007aff, #005bb5); color: white; 
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.5); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 122, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); } }

        /* 状态与探针 */
        .status-container {
            margin-top: 12px; display: flex; flex-direction: column; align-items: center; pointer-events: auto;
            background: rgba(245, 245, 247, 0.8); padding: 4px 12px; border-radius: 12px;
        }
        .status-text { font-size: 13px; font-weight: 600; color: #666; }
        .vad-level-bar { width: 80px; height: 4px; background: #ddd; border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
        .vad-level-fill { height: 100%; width: 0%; background: #34c759; transition: width 0.1s; }

        /* 🎯 底部原生导航栏 (Bottom Tab Bar) */
        .bottom-tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: calc(60px + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            text-decoration: none; color: #86868b; width: 33%; height: 100%; transition: color 0.2s;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            text-decoration: none; color: #86868b; flex: 1; height: 100%; transition: color 0.2s;
        }
        .tab-icon { font-size: 22px; }
        .tab-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 data-i18n="title">🗣️ 随身翻译</h1>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button id="exportBtn" title="导出记录" style="background: none; border: none; font-size: 22px; cursor: pointer; padding: 0;">💾</button>
            <select class="lang-select" id="nativeLang"></select>
        </div>
    </div>

    <div class="history-container" id="historyList">
        <div class="history-item streaming-box" id="streamingBox">
            <div class="history-content">
                <div class="original-text" id="streamOriginal">听写中...</div>
                <div class="translated-text"><span id="streamTranslated"></span><span class="streaming-cursor"></span></div>
            </div>
        </div>
    </div>

    <div class="action-island-wrapper">
        <div class="action-island">
            <button class="side-action-btn btn-clear" id="clearBtn" title="清空记录">🗑️</button>
            
            <button class="vad-toggle-btn" id="vadToggleBtn" title="开启同传">🎙️</button>
            
            <button class="side-action-btn btn-play" id="playSelectedBtn" title="播放选中项">▶️</button>
        </div>
        
        <div class="status-container">
            <div class="status-text" id="statusText" data-i18n="status_sleep">系统已休眠</div>
            <div class="vad-level-bar" id="vadLevelBar"><div class="vad-level-fill" id="vadLevelFill"></div></div>
        </div>
    </div>

    <div class="bottom-tab-bar">
        <a href="/" class="tab-item active">
            <span class="tab-icon">🌐</span>
            <span class="tab-label" data-i18n="tab_trans">同传</span>
        </a>
        <a href="/tutor" class="tab-item">
            <span class="tab-icon">👨‍🏫</span>
            <span class="tab-label" data-i18n="tab_tutor">外教</span>
        </a>
        
        <a href="https://github.com/linxuhao/linxuhao-translator" target="_blank" class="tab-item">
            <span class="tab-icon">
                <svg viewBox="0 0 16 16" aria-hidden="true" style="width: 22px; height: 22px; fill: currentColor;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </span>
            <span class="tab-label">GitHub</span>
        </a>
        
        <a href="/admin" class="tab-item" id="adminTab" style="display: none;">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_admin">设置</span>
        </a>
    </div>
    <script src="/resources/i18n.js?v=1.3"></script>
    <script src="/resources/app.js?v=2.4"></script>
</body>
</html>
