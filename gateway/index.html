<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="/resources/icon.png" crossorigin="use-credentials">
    <link rel="manifest" href="/resources/manifest.json" crossorigin="use-credentials">
    <title>随身翻译官</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background-color: #f5f5f7; color: #333;
        }
        .header { position: absolute; top: 5%; text-align: center; width: 100%; }
        h1 { margin: 0; font-size: 28px; color: #1d1d1f; }
        .lang-indicator {
            margin-top: 8px; font-size: 16px; color: #86868b;
            background: #e8e8ed; padding: 4px 12px; border-radius: 12px;
            display: inline-block;
        }
        
        /* 新增控制面板样式 */
        .controls-panel {
            margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .lang-select {
            padding: 8px 12px; border-radius: 8px; border: 1px solid #d2d2d7; 
            font-size: 14px; background: #fff; outline: none;
        }
        .debug-toggle {
            font-size: 14px; color: #86868b; display: flex; align-items: center; gap: 5px;
        }

        .record-btn {
            width: 220px; height: 220px; border-radius: 50%;
            background: linear-gradient(135deg, #007aff, #005bb5);
            color: white; font-size: 28px; font-weight: bold;
            border: none; box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4);
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-user-select: none; margin-top: 20px;
        }
        .record-btn:active, .record-btn.recording {
            transform: scale(0.95); background: linear-gradient(135deg, #ff3b30, #c92a20);
            box-shadow: 0 5px 15px rgba(255, 59, 48, 0.4);
        }
        .status-container {
            margin-top: 30px; display: flex; flex-direction: column; align-items: center; height: 80px;
        }
        .status-text { font-size: 20px; font-weight: 500; margin-bottom: 10px; }
        .play-btn {
            padding: 8px 24px; font-size: 16px; color: #fff; background-color: #34c759;
            border: none; border-radius: 20px; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3);
            display: none;
        }
        .play-btn:active { transform: scale(0.95); background-color: #2eb050; }
        
        #latency-dashboard {
            position: absolute; bottom: 5%; width: 90%; max-height: 25vh; overflow-y: auto;
            background: #fff; padding: 15px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 12px; color: #666; font-family: monospace; line-height: 1.6;
            text-align: left; display: none; /* 默认隐藏，由 Debug 控制 */
        }
        .metric { font-weight: bold; color: #1d1d1f; }
        .log-entry { border-top: 1px dashed #eee; margin-top: 5px; padding-top: 5px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🗣️ 随身翻译官</h1>
        <div class="lang-indicator" id="lang-display">环境语种: 待检测</div>
        
        <div class="controls-panel">
            <select class="lang-select" id="nativeLang">
                <option value="zh">中文 (zh)</option>
                <option value="en">English (en)</option>
                <option value="yue">粤语 (yue)</option>
                <option value="ar">العربية (ar)</option>
                <option value="de">Deutsch (de)</option>
                <option value="fr">Français (fr)</option>
                <option value="es">Español (es)</option>
                <option value="pt">Português (pt)</option>
                <option value="id">Bahasa Indonesia (id)</option>
                <option value="it">Italiano (it)</option>
                <option value="ko">한국어 (ko)</option>
                <option value="ru">Русский (ru)</option>
                <option value="th">ไทย (th)</option>
                <option value="vi">Tiếng Việt (vi)</option>
                <option value="ja">日本語 (ja)</option>
                <option value="tr">Türkçe (tr)</option>
                <option value="hi">हिन्दी (hi)</option>
                <option value="ms">Bahasa Melayu (ms)</option>
                <option value="nl">Nederlands (nl)</option>
                <option value="sv">Svenska (sv)</option>
                <option value="da">Dansk (da)</option>
                <option value="fi">Suomi (fi)</option>
                <option value="pl">Polski (pl)</option>
                <option value="cs">Čeština (cs)</option>
                <option value="fil">Filipino (fil)</option>
                <option value="fa">فارسی (fa)</option>
                <option value="el">Ελληνικά (el)</option>
                <option value="hu">Magyar (hu)</option>
                <option value="mk">Македонски (mk)</option>
                <option value="ro">Română (ro)</option>
            </select>
            <label class="debug-toggle">
                <input type="checkbox" id="debugCheckbox"> 开启 Debug 模式
            </label>
        </div>
    </div>

    <button class="record-btn" id="recordBtn">按住说话</button>
    
    <div class="status-container">
        <div class="status-text" id="statusText">系统已就绪</div>
        <button class="play-btn" id="playBtn">▶️ 播放翻译</button>
    </div>

    <div id="latency-dashboard">
        📊 算力监控面板待命中...<br>
        请进行第一次对话以激活探针。
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let currentForeignLang = "fr"; 
        let latestTtsText = "";
        let latestTtsLang = "";

        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const playBtn = document.getElementById('playBtn');
        const dashboard = document.getElementById('latency-dashboard');
        const langDisplay = document.getElementById('lang-display');
        const nativeLangSelect = document.getElementById('nativeLang');
        const debugCheckbox = document.getElementById('debugCheckbox');

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        // --- 初始化 Native Language ---
        function initNativeLanguage() {
            const sysLangCode = (navigator.language || navigator.userLanguage || "zh").split('-')[0].toLowerCase();
            const options = Array.from(nativeLangSelect.options);
            const match = options.find(opt => opt.value === sysLangCode);
            nativeLangSelect.value = match ? sysLangCode : "zh";
        }
        initNativeLanguage();

        // --- Debug 面板显示控制 ---
        debugCheckbox.addEventListener('change', (e) => {
            dashboard.style.display = e.target.checked ? 'block' : 'none';
        });

        if ('speechSynthesis' in window) {
            speechSynthesis.getVoices();
        }

        function speakText(text, langCode) {
            if (!('speechSynthesis' in window)) return;
            const langMap = { "zh": "zh-CN", "fr": "fr-FR", "en": "en-US", "es": "es-ES", "ja": "ja-JP", "ko": "ko-KR", "de": "de-DE", "ru": "ru-RU", "it": "it-IT", "pt": "pt-BR" };
            const systemLang = langMap[langCode] || langCode;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = systemLang;
            utterance.rate = 1.0;

            utterance.onstart = () => { statusText.innerText = "🔊 正在播报..."; };
            utterance.onend = () => { statusText.innerText = "按住继续说话"; };
            utterance.onerror = () => { statusText.innerText = "按住继续说话"; };
            
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
        }

        playBtn.addEventListener('click', () => {
            if (latestTtsText) speakText(latestTtsText, latestTtsLang);
        });

// ---------- 录音初始化 ----------
        async function initAudio() {
            try {
                // 1. 前置安全上下文与 API 检测
                if (!window.isSecureContext) {
                    throw new Error("iOS 限制: 必须使用 HTTPS 或 Localhost");
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("浏览器不支持录音 API (navigator.mediaDevices 缺失)");
                }
                if (typeof MediaRecorder === 'undefined') {
                    throw new Error("当前 iOS 版本过低，不支持 MediaRecorder");
                }

                // 2. 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 3. 兼容老版本 Safari 的 MIME Type
                let options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported('audio/webm')) {
                    options = { mimeType: 'audio/mp4' }; // 老版 iOS 备用格式
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    audioChunks = [];
                    await sendAudioToServer(audioBlob);
                };
            } catch (err) {
                console.error("Mic initialization failed:", err);
                // 捕获系统级报错并展示
                const errorMsg = err.name === 'NotAllowedError' ? "麦克风被拒或被系统占用" 
                               : err.name === 'NotFoundError' ? "未检测到麦克风硬件" 
                               : err.message || err.name || "未知麦克风错误";
                               
                statusText.innerText = `⚠️ 录音失败: ${errorMsg}`;
                statusText.style.color = "red";
                statusText.style.fontSize = "16px"; // 缩小字号防溢出
            }
        }

        async function sendAudioToServer(audioBlob) {
            statusText.innerText = "⏳ 算力矩阵处理中...";
            
            const formData = new FormData();
            formData.append("audio_file", audioBlob, "recording.webm");
            formData.append("native_lang", nativeLangSelect.value); // 动态获取 Native Lang
            formData.append("last_foreign_lang", currentForeignLang);
            formData.append("debug", debugCheckbox.checked); // 传递 debug 状态

            const t_frontend_start = Date.now();

            try {
                const response = await fetch("/api/voice", { method: "POST", body: formData });
                const t_frontend_end = Date.now();
                const total_frontend_time = t_frontend_end - t_frontend_start;

                if (response.ok) {
                    const data = await response.json();
                    const networkTime = total_frontend_time - data.metrics.gateway_ms;

                    const newForeignLang = data.detected_foreign_lang;
                    
                    // 只要后端返回了有效的外语（非当前设定的母语），就更新外语状态变量
                    if (newForeignLang && newForeignLang !== nativeLangSelect.value) {
                        currentForeignLang = newForeignLang;
                    }
                    
                    // 物理层面：剥离 if 阻断，强制每次请求成功后刷新 UI 消除“待检测”字样
                    langDisplay.innerText = `环境语种: 自动检测 (${currentForeignLang})`;

                    // 构建指标与后端日志视图
                    let logsHtml = "";
                    if (data.logs && data.logs.length > 0) {
                        logsHtml = `<div class="log-entry"><strong>Backend Logs:</strong><br>${data.logs.join('<br>')}</div>`;
                    }

                    dashboard.innerHTML = 
                        `🚀 总响应: <span class="metric">${total_frontend_time}ms</span><br>` +
                        `🌐 网络传输: <span class="metric">${networkTime}ms</span> | 🗼 网关处理: <span class="metric">${data.metrics.gateway_ms}ms</span><br>` +
                        `👂 听觉(ASR): <span class="metric">${data.metrics.asr_ms}ms</span><br>` +
                        `🧠 大脑(LLM): <span class="metric">${data.metrics.llm_ms}ms</span>` + logsHtml;

                    if (isIOS) {
                        latestTtsText = data.text;
                        latestTtsLang = data.target_tts_lang;
                        playBtn.style.display = 'inline-block';
                        statusText.innerText = "✅ 翻译完成";
                    } else {
                        speakText(data.text, data.target_tts_lang);
                    }

                } else {
                    statusText.innerText = "❌ 翻译失败，请重试";
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ 网络连接异常";
            }
        }

        const startRecording = (e) => {
            e.preventDefault();
            if (!mediaRecorder) return;
            recordBtn.classList.add('recording');
            recordBtn.innerText = "松开发送";
            statusText.innerText = "🎙️ 正在录音...";
            playBtn.style.display = 'none';
            audioChunks = [];
            mediaRecorder.start();
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (!mediaRecorder || mediaRecorder.state === "inactive") return;
            recordBtn.classList.remove('recording');
            recordBtn.innerText = "按住说话";
            mediaRecorder.stop();
        };

        recordBtn.addEventListener('touchstart', startRecording, { passive: false });
        recordBtn.addEventListener('touchend', stopRecording);
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);

        window.onload = initAudio;
    </script>
</body>
</html>
