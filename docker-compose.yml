services:
  # ==========================================
  # [网络层] Cloudflare 穿透隧道 (全球极速访问)
  # ==========================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      # ⚠️ 稍后需要在终端获取并填入你的专有 TUNNEL_TOKEN
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}

  # ----------------------------------------
  # 调度中枢: API Gateway & PWA
  # ----------------------------------------
  gateway:
    build:
      context: ./gateway
    container_name: api_gateway
    deploy:
      resources:
        limits:
          # 防止网关吃掉太多 CPU
          cpus: '2'
          memory: 512M
    ports:
      - "5000:5000"
    volumes:
      - ./gateway/app:/app
    restart: unless-stopped

  # ==========================================
  # GPU 0 (7900 XTX): vLLM 推理引擎 (2026 SOTA 架构)
  # ==========================================
  vllm-qwen:
    image: vllm/vllm-openai-rocm:latest
    container_name: vllm_qwen
    ports:
      - "8000:8000"
    ipc: host
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    environment:
      - HIP_VISIBLE_DEVICES=0
      - VLLM_USE_TRITON_AWQ=1
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    entrypoint: []
    # 【关键修复 2】：手动指定 bash 执行环境
    command: >
      vllm serve ELVISIO/Qwen3-30B-A3B-Instruct-2507-AWQ     
      --quantization awq
      --dtype float16
      --max-model-len 32768
      --gpu-memory-utilization 0.95
      --max-num-seqs 32
      --served-model-name qwen3
      --trust-remote-code
    restart: unless-stopped

 # ==========================================
# 文件名: docker-compose.audio.yml
# 架构定位: GPU 1 (7800 XT) - 纯正 ROCm 原生听觉与发声节点
# ==========================================
  qwen3-asr:
    build:
      context: ./qwen3-asr
    container_name: qwen3_asr
    ports:
      - "9000:8000"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    environment:
      - HIP_VISIBLE_DEVICES=1 # 物理隔离至 7800 XT
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    volumes:
      - ./qwen3-asr/app:/app
      - ~/.cache/huggingface:/root/.cache/huggingface # 缓存模型，避免重复下载
    restart: unless-stopped
