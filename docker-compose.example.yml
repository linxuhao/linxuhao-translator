services:
  # ==========================================
  # [网络层] Cloudflare 穿透隧道 (全球极速访问)
  # ==========================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}

  # ----------------------------------------
  # 调度中枢: API Gateway & PWA
  # ----------------------------------------
  gateway:
    build:
      context: ./gateway
    container_name: api_gateway
    ports:
      - "5000:5000"
    volumes:
      - ./gateway/app:/app
    restart: unless-stopped

  # ==========================================
  # GPU 0: vLLM 推理引擎 (Qwen3.6-27B)
  # 支持三种模式: thinking(默认)/instruct/non-thinking
  # 配置项:
  #   - chat_template_kwargs.enable_thinking: True  = 思考模式 (默认)
  #   - chat_template_kwargs.enable_thinking: False = 直接回复模式
  #   - chat_template_kwargs.preserve_thinking: True = 保留历史推理
  # ==========================================
  vllm-qwen:
    image: vllm/vllm-openai:latest
    container_name: vllm_qwen
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_USE_TRITON_AWQ=1
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    entrypoint: []
    command: >
      vllm serve Qwen/Qwen3.6-27B-GPTQ-Int4
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --language-model-only
      --max-num-seqs 80
      --served-model-name qwen3
      --trust-remote-code
    restart: unless-stopped

  # ==========================================
  # GPU 1: Qwen3-ASR 语音识别
  # ==========================================
  qwen3-asr:
    image: vllm/vllm-openai:latest
    container_name: qwen3_asr
    ports:
      - "9000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=1
      - VLLM_USE_TRITON_AWQ=1
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    entrypoint: []
    command: >
      vllm serve Qwen/Qwen3-ASR-1.7B
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --max-num-seqs 80
      --served-model-name qwen3-asr
      --trust-remote-code
    restart: unless-stopped