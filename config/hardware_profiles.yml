# VIP Gateway Hardware Profiles Configuration
#
# This file defines hardware-specific deployment configurations.
# Each profile specifies the optimal model selection and parameters
# for a given hardware setup.
#
# Usage:
#   ./install.sh                    # Auto-detect and select best profile
#   ./install.sh --profile NAME     # Use specific profile
#   ./install.sh --list-profiles    # Show all available profiles

# ==========================================
# Vendor-Specific Configuration
# ==========================================
vendors:
  nvidia:
    name: NVIDIA
    image: vllm/vllm-openai:latest
    env_var: CUDA_VISIBLE_DEVICES
    devices: []
    group_add: []

  amd:
    name: AMD ROCm
    image: vllm/vllm-openai-rocm:latest
    env_var: HIP_VISIBLE_DEVICES
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

  apple:
    name: Apple Silicon
    image: vllm/vllm-openai:latest
    env_var: METAL_DEVICE_ID
    devices: []
    group_add: []
    note: "Metal acceleration auto-detected on macOS"

  intel:
    name: Intel Arc
    image: vllm/vllm-openai:latest
    env_var: ONEAPI_DEVICE_SELECTOR
    devices: []
    group_add: []
    note: "Requires Intel Compute Runtime (OpenCL/SYCL)"

