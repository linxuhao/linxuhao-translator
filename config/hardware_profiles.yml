# ==========================================
# Profile Matching Rules
# ==========================================
matching:
  # Priority order for profile matching
  # First match wins (more specific profiles should come first)
  priority:
    - exact_profile   # User specified --profile
    - dual_gpu        # Match dual GPU by total VRAM
    - single_gpu      # Match single GPU by VRAM
    - fallback        # Lowest spec that works

  # Fallback profile when no match found
  fallback: nvidia_single_6gb

  # Minimum requirements
  minimum:
    vram_mb: 5000
    message: "GPU must have at least 5GB VRAM for basic operation"